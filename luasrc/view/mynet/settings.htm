<%+header%>
<link rel="stylesheet" href="<%=resource%>/mynet/css/mynet.css">

<h2><%:Settings%></h2>

<form method="post" action="<%=luci.dispatcher.build_url('admin/mynet/settings/save')%>" class="mn-form mn-form-wide">

  <div class="mn-form-group">
    <label for="api_url"><%:API Server URL%></label>
    <input type="url" id="api_url" name="api_url"
           value="<%=pcdata(api_url or '')%>"
           placeholder="http://your-server/api/v1"
           required>
    <p class="mn-hint mn-small mn-muted">
      <%:Base URL of the MyNet API server, e.g.%> <code>https://api.mynet.club/api/v1</code>
    </p>
  </div>

  <div class="mn-form-actions">
    <button type="submit" class="mn-btn"><%:Save%></button>
    <a class="mn-btn mn-btn-secondary" href="<%=luci.dispatcher.build_url('admin/mynet/index')%>">
      <%:Cancel%>
    </a>
  </div>

</form>

<hr class="mn-divider">

<h3><%:Credential Status%></h3>
<p class="mn-muted mn-small">
  <%=pcdata(user_email ~= "" and user_email or "(not logged in)")%>
  &nbsp;·&nbsp;
  <a href="<%=luci.dispatcher.build_url('admin/mynet/logout')%>"><%:Logout%></a>
</p>

<%+footer%>
