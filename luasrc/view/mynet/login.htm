<%+header%>
<link rel="stylesheet" href="<%=resource%>/mynet/css/mynet.css">

<div class="mn-login-wrap">
    <div class="mn-login-box">

        <div class="mn-login-logo">
            <h2>MyNet</h2>
            <p class="mn-muted">OpenWrt Management</p>
        </div>

        <% if login_error then %>
        <div class="alert-message error">
            <%=pcdata(login_error)%>
        </div>
        <% end %>

        <form method="post" action="<%=luci.dispatcher.build_url('admin/services/mynet/login')%>">
            <div style="margin-bottom:16px">
                <label for="email" style="display:block;margin-bottom:4px;font-size:.9em;color:var(--mn-text-muted,#666)"><%:Email%></label>
                <input type="email" id="email" name="email" class="cbi-input-text" style="width:100%"
                    value="<%=pcdata(prefill_email or '')%>"
                    placeholder="user@example.com" autocomplete="username" required>
            </div>

            <div style="margin-bottom:20px">
                <label for="password" style="display:block;margin-bottom:4px;font-size:.9em;color:var(--mn-text-muted,#666)"><%:Password%></label>
                <input type="password" id="password" name="password" class="cbi-input-password" style="width:100%"
                    autocomplete="current-password" required>
            </div>

            <div style="text-align:center">
                <button type="submit" class="cbi-button cbi-button-apply" style="width:100%">
                    <%:Login%>
                </button>
            </div>
        </form>

        <p class="mn-muted mn-small" style="margin-top:1rem;text-align:center">
            <%:No account?%>
            <a href="https://my.mynet.club/auth/register" target="_blank" rel="noopener"><%:Register at mynet.club%></a>
        </p>

        <hr style="margin:16px 0;border-color:#eee">
        <p class="mn-muted mn-small" style="text-align:center">
            <%:Don't want to register?%>
            <a href="<%=luci.dispatcher.build_url('admin/services/mynet/guest')%>">
                <%:Try GNB Offline Mode%> &rarr;
            </a>
        </p>

    </div>
</div>

<%+footer%>
